name: 开发任务
description: 实现一个范围明确、可独立验收的能力
title: "[Development] "
labels:
  - "type:development"
body:
  - type: textarea
    id: goal
    attributes:
      label: 目标
      description: 这项开发要实现什么？
    validations:
      required: true
  - type: textarea
    id: output
    attributes:
      label: 交付物
      description: 需要提交哪些代码、接口、页面或配置？
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: 范围与非范围
      description: 涉及哪些模块，哪些内容不在本任务内？
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: 验收标准
      description: 用可观察、可验证的方式描述完成条件。
    validations:
      required: true
  - type: textarea
    id: verification
    attributes:
      label: 验证方式
      description: 测试命令、截图、录屏或日志证据放在哪里？
    validations:
      required: true
  - type: textarea
    id: dependencies
    attributes:
      label: 依赖
      description: 依赖哪些 Issue、服务、人员或环境？
