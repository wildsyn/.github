name: 可领取开发任务
description: 一个结果边界、一个 Human Owner、可审查验证回滚的 AI 原生任务
title: "[Development] "
labels:
  - "type:development"
body:
  - type: input
    id: parent
    attributes:
      label: 父需求
      description: 关联 Feature Brief；没有父需求时说明原因。
      placeholder: wildsyn/wildflow#123
    validations:
      required: true
  - type: textarea
    id: goal
    attributes:
      label: 目标
      description: 本任务为父需求提供什么能力？
    validations:
      required: true
  - type: textarea
    id: output
    attributes:
      label: 交付物
      description: 需要提交哪些代码、接口、页面、配置或测试？
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: 范围与非范围
      description: 涉及哪些模块，明确哪些内容不在本任务内？
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: 验收标准
      description: 用可观察、可验证的方式逐条描述完成条件。
    validations:
      required: true
  - type: textarea
    id: verification
    attributes:
      label: 验证方式
      description: 测试命令、截图、录屏、日志或真实服务路径。
    validations:
      required: true
  - type: textarea
    id: dependencies
    attributes:
      label: 依赖与阻塞
      description: 依赖哪些 Issue、PR、服务、接口、人员或环境？
  - type: input
    id: human_owner
    attributes:
      label: Human Owner
      description: 对范围、证据和交付闭环负责的 GitHub 用户名；创建后请同步设置 Assignee。
      placeholder: "@username"
    validations:
      required: true
  - type: dropdown
    id: agent_delegate
    attributes:
      label: Agent Delegate
      description: 主要执行 Agent；这不改变 Human Owner 的最终责任。
      options:
        - Codex
        - Claude Code
        - GitHub Copilot
        - Multiple agents
        - None
    validations:
      required: true
  - type: textarea
    id: risks
    attributes:
      label: 风险与回滚
      description: 数据、安全、兼容性和部署风险；不适用时写“无”。
    validations:
      required: true
  - type: dropdown
    id: size
    attributes:
      label: Size
      description: 按审查、验证和回滚边界判断，不按 AI 编码时间判断。
      options:
        - S — 局部低风险、快速验证
        - M — 完整结果包、需要集成验证
        - L — 高风险或跨领域，必须先拆分
        - XL — 只能作为 Feature Brief
    validations:
      required: true
  - type: dropdown
    id: risk
    attributes:
      label: Risk
      options:
        - Low
        - Medium
        - High
    validations:
      required: true
  - type: dropdown
    id: verification_level
    attributes:
      label: 最高验证级别
      description: 本任务进入 Done 前必须达到的最高环境。
      options:
        - Unit / Static
        - Integration
        - Staging
        - Production
    validations:
      required: true
  - type: checkboxes
    id: ready
    attributes:
      label: Ready 检查
      options:
        - label: 该任务只有一个主要交付物和一个 Owner
          required: true
        - label: Reviewer 可以理解影响面，失败时可以独立停止或回滚
          required: true
        - label: 验收方式不依赖领取者猜测需求
          required: true
        - label: 依赖已完成或已明确标记
          required: true
