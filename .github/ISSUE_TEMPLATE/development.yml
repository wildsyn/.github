name: 可领取开发任务
description: 0.5–2 天、一个仓库、一个 Owner、可独立验收的实现任务
title: "[Development] "
labels:
  - "type:development"
body:
  - type: input
    id: parent
    attributes:
      label: 父需求
      description: 关联 Feature Brief；没有父需求时说明原因。
      placeholder: wildsyn/wildflow#123
    validations:
      required: true
  - type: textarea
    id: goal
    attributes:
      label: 目标
      description: 本任务为父需求提供什么能力？
    validations:
      required: true
  - type: textarea
    id: output
    attributes:
      label: 交付物
      description: 需要提交哪些代码、接口、页面、配置或测试？
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: 范围与非范围
      description: 涉及哪些模块，明确哪些内容不在本任务内？
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: 验收标准
      description: 用可观察、可验证的方式逐条描述完成条件。
    validations:
      required: true
  - type: textarea
    id: verification
    attributes:
      label: 验证方式
      description: 测试命令、截图、录屏、日志或真实服务路径。
    validations:
      required: true
  - type: textarea
    id: dependencies
    attributes:
      label: 依赖与阻塞
      description: 依赖哪些 Issue、PR、服务、接口、人员或环境？
  - type: textarea
    id: risks
    attributes:
      label: 风险与回滚
      description: 数据、安全、兼容性和部署风险；不适用时写“无”。
    validations:
      required: true
  - type: dropdown
    id: estimate
    attributes:
      label: 预计规模
      description: 超过 2 天应继续拆分。
      options:
        - 0.5 天
        - 1 天
        - 2 天
    validations:
      required: true
  - type: checkboxes
    id: ready
    attributes:
      label: Ready 检查
      options:
        - label: 该任务只有一个主要交付物和一个 Owner
          required: true
        - label: 验收方式不依赖领取者猜测需求
          required: true
        - label: 依赖已完成或已明确标记
          required: true
